<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator nganii</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .calculator {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      padding: 25px;
      width: 320px;
      color: #fff;
    }

    #display {
      width: 100%;
      height: 60px;
      border: none;
      font-size: 28px;
      padding: 10px;
      text-align: right;
      border-radius: 12px;
      margin-bottom: 20px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    .buttons button {
      padding: 20px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .buttons button:hover {
      background: rgba(255, 255, 255, 0.35);
      transform: scale(1.05);
    }

    video {
      display: none;
      margin-top: 20px;
      border: 3px solid #fff;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
    }

    @media (max-width: 360px) {
      .calculator {
        width: 90%;
        padding: 20px;
      }
    }
  </style>
</head>
<body>

<div class="calculator">
  <input type="text" id="display" disabled placeholder="0">
  <div class="buttons">
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button onclick="press('+')">+</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button onclick="press('-')">−</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button onclick="press('*')">×</button>

    <button onclick="press('0')">0</button>
    <button onclick="clearDisplay()">C</button>
    <button onclick="calculate()">=</button>
    <button onclick="press('/')">÷</button>
  </div>
</div>

<video id="relapse-video" width="100%" controls>
  <source id="video-source" src="relapse.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<script>
  const display = document.getElementById("display");
  const video = document.getElementById("relapse-video");
  const videoSource = document.getElementById("video-source");

  function press(value) {
    display.value += value;
  }

  function clearDisplay() {
    display.value = "";
    video.pause();
    video.currentTime = 0;
    video.style.display = "none";
  }

  function calculate() {
    try {
      const result = eval(display.value);
      display.value = result;

      if (result === 666 || result === 222 || result === 123 || result == 143) {
        // Change video source for result 123
        if(result === 123) {
          videoSource.src = "relapse.mp4";
        } 
         if(result === 222) {
          videoSource.src = "relapse3.mp4";
        }
        if(result== 143)
         {
          videoSource.src = "secret.mp4";
        }
        video.load();
        video.style.display = "block";
        video.play();

        // Fullscreen request
        if (video.requestFullscreen) {
          video.requestFullscreen();
        } else if (video.webkitRequestFullscreen) {
          video.webkitRequestFullscreen();
        } else if (video.msRequestFullscreen) {
          video.msRequestFullscreen();
        }
      } else {
        video.pause();
        video.currentTime = 0;
        video.style.display = "none";
      }
    } catch (err) {
      display.value = "Error";
    }
  }
</script>

</body>
</html>
